project: materre
group: materre-repeta
compose_file: infrastructure/docker-compose.prod.yml

services:
  backend:
    image: ghcr.io/materre-repeta/backend
    tag: main
    poll_interval: 60
  frontend:
    image: ghcr.io/materre-repeta/frontend
    tag: main
    poll_interval: 60

infra:
  postgres:
    image: postgres:16-alpine
    auto_update: false
