# Production docker-compose for konch deployment
# Secrets injected from Doppler via konch into .env
# SSL handled by Cloudflare tunnel

services:
  postgres:
    image: postgres:16-alpine
    container_name: materre-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-admin} -d ${DB_NAME:-materre}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - materre-network

  backend:
    image: ghcr.io/materre-repeta/backend:main
    container_name: materre-api
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_JPA_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SERVER_PORT: ${SERVER_PORT:-8081}
      H2_CONSOLE_ENABLED: "false"
      JPA_SHOW_SQL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8081/api/health"]
      interval: 15s
      timeout: 10s
      start_period: 120s
      retries: 10
    restart: unless-stopped
    networks:
      - materre-network
      - konch
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    image: ghcr.io/materre-repeta/frontend:main
    container_name: materre-web
    restart: unless-stopped
    networks:
      - materre-network
      - konch
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  materre-network:
    driver: bridge
  konch:
    external: true

volumes:
  postgres_data:
    driver: local
