services:
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=admin@materre.online"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - materre-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - materre-network

  backend:
    image: ghcr.io/materre-repeta/backend:develop
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_JPA_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      SERVER_PORT: ${SERVER_PORT}
      H2_CONSOLE_ENABLED: "false"
      JPA_SHOW_SQL: "false"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.materre.online`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=myresolver"
      - "traefik.http.services.backend.loadbalancer.server.port=8081"
    depends_on:
      - postgres
    networks:
      - materre-network

  frontend:
    image: ghcr.io/materre-repeta/frontend:develop
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`materre.online`) || Host(`www.materre.online`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
    networks:
      - materre-network

networks:
  materre-network:
    driver: bridge

volumes:
  postgres_data:
  letsencrypt:
